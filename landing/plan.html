<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Plan en Pitchmi</title>
    <meta
      id="metaDescription"
      name="description"
      content="Descubre este plan en Pitchmi."
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <meta id="ogTitle" property="og:title" content="Plan en Pitchmi" />
    <meta
      id="ogDescription"
      property="og:description"
      content="Descubre este plan en Pitchmi."
    />
    <meta property="og:type" content="article" />
    <meta id="ogUrl" property="og:url" content="https://pitchmi.app/plan.html" />

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Libre+Baskerville:wght@400;700&display=swap");

      :root {
        --bg: #f7f4ef;
        --paper: #fffdf8;
        --text: #242321;
        --muted: #766f67;
        --line: rgba(44, 42, 40, 0.12);
        --sage: #8b9078;
        --sage-soft: #e3e4d8;
        --shadow: 0 22px 60px rgba(44, 42, 40, 0.08);
        --radius-xl: 34px;
        --radius-lg: 24px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 10% 0%, rgba(255, 255, 255, 0.92), transparent 30%),
          radial-gradient(circle at 90% 8%, rgba(227, 228, 216, 0.72), transparent 26%),
          linear-gradient(180deg, #fbf8f2 0%, var(--bg) 52%, #f1ece3 100%);
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .page {
        width: min(1120px, 100%);
        margin: 0 auto;
        padding: 34px clamp(18px, 5vw, 72px) 34px;
      }

      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: clamp(42px, 7vw, 78px);
      }

      .logo {
        display: inline-flex;
        flex-direction: column;
        align-items: center;
        width: fit-content;
        gap: 8px;
      }

      .logo-mark {
        font-family: "Libre Baskerville", Georgia, serif;
        font-size: 17px;
        line-height: 1;
      }

      .logo-word {
        font-family: "Libre Baskerville", Georgia, serif;
        font-size: 19px;
        letter-spacing: 0.34em;
        font-weight: 400;
      }

      .logo-line {
        width: 1px;
        height: 24px;
        background: var(--text);
        opacity: 0.82;
      }

      .button {
        min-height: 42px;
        border-radius: 999px;
        border: 1px solid rgba(44, 42, 40, 0.18);
        padding: 0 17px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        font-size: 13px;
        font-weight: 650;
        cursor: pointer;
        white-space: nowrap;
      }

      .button-dark {
        background: #242321;
        color: #fff;
        border-color: #242321;
        box-shadow: 0 14px 28px rgba(44, 42, 40, 0.17);
      }

      .button-light {
        background: rgba(255, 253, 248, 0.68);
        color: var(--text);
      }

      .back {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 650;
        margin-bottom: 22px;
      }

      .detail {
        display: grid;
        grid-template-columns: 1.05fr 0.95fr;
        gap: 0;
        border-radius: var(--radius-xl);
        overflow: hidden;
        border: 1px solid var(--line);
        background: rgba(255, 253, 248, 0.72);
        box-shadow: var(--shadow);
      }

      .media {
        min-height: 520px;
        background:
          radial-gradient(circle at 28% 24%, rgba(255, 255, 255, 0.64), transparent 22%),
          linear-gradient(135deg, #e8e1d7, #c9c2b2);
        background-size: cover;
        background-position: center;
        display: grid;
        place-items: center;
        font-size: 68px;
      }

      .content {
        padding: clamp(26px, 4vw, 48px);
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .category {
        display: inline-flex;
        width: fit-content;
        border-radius: 999px;
        background: rgba(184, 176, 155, 0.18);
        color: #6d645b;
        padding: 7px 11px;
        font-size: 10px;
        letter-spacing: 0.12em;
        font-weight: 800;
        text-transform: uppercase;
        margin-bottom: 16px;
      }

      h1 {
        font-family: "Libre Baskerville", Georgia, serif;
        font-size: clamp(38px, 5vw, 62px);
        line-height: 1.02;
        font-weight: 400;
        letter-spacing: -0.06em;
        margin: 0 0 18px;
      }

      .meta {
        display: grid;
        gap: 7px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.5;
        margin-bottom: 22px;
      }

      .description {
        color: #45413c;
        font-size: 15.5px;
        line-height: 1.78;
        margin: 0 0 28px;
        white-space: pre-line;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      .loading,
      .error {
        border-radius: var(--radius-xl);
        background: rgba(255, 253, 248, 0.7);
        border: 1px solid var(--line);
        padding: 30px;
        color: var(--muted);
      }

      footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        padding-top: 34px;
        color: var(--muted);
        font-size: 12.5px;
      }

      .footer-logo {
        font-family: "Libre Baskerville", Georgia, serif;
        letter-spacing: 0.34em;
        color: var(--text);
      }

      .footer-links {
        display: flex;
        align-items: center;
        gap: 20px;
        flex-wrap: wrap;
      }

      @media (max-width: 900px) {
        .detail {
          grid-template-columns: 1fr;
        }

        .media {
          min-height: 340px;
        }
      }

      @media (max-width: 560px) {
        .page {
          padding: 22px 14px;
        }

        .header {
          align-items: flex-start;
          flex-direction: column;
        }

        h1 {
          font-size: 44px;
        }

        footer {
          align-items: flex-start;
          flex-direction: column;
        }
      }
    </style>
  </head>

  <body>
    <div class="page">
      <header class="header">
        <a class="logo" href="/" aria-label="Pitchmi">
          <span class="logo-mark">✦</span>
          <span class="logo-line"></span>
          <span class="logo-word">PITCHMI</span>
          <span class="logo-line"></span>
          <span class="logo-mark">▾</span>
        </a>

        <a
          class="button button-dark"
          href="https://apps.apple.com/es/app/pitchmi/id6754662676"
          target="_blank"
          rel="noopener noreferrer"
        >
          Descargar la app
        </a>
      </header>

      <main>
        <a class="back" href="/planes.html">← Ver todos los planes</a>

        <div id="loading" class="loading">Cargando plan...</div>

        <div id="error" class="error" style="display: none">
          No se ha encontrado este plan.
        </div>

        <article id="detail" class="detail" style="display: none">
          <div id="media" class="media">✦</div>

          <div class="content">
            <div id="category" class="category">Plan</div>
            <h1 id="title">Plan en Pitchmi</h1>

            <div class="meta">
              <span id="location">📍 Ubicación disponible en Pitchmi</span>
              <span id="date">🗓️ Publicado recientemente</span>
            </div>

            <p id="description" class="description">
              Descubre este plan en Pitchmi.
            </p>

            <div class="actions">
              <a
                class="button button-dark"
                href="https://apps.apple.com/es/app/pitchmi/id6754662676"
                target="_blank"
                rel="noopener noreferrer"
              >
                Descargar en App Store
              </a>

              <button id="shareButton" class="button button-light" type="button">
                Compartir
              </button>
            </div>
          </div>
        </article>
      </main>

      <footer>
        <div class="footer-logo">PITCHMI</div>

        <div class="footer-links">
          <a href="/">Inicio</a>
          <a href="/planes.html">Planes</a>
          <a href="/privacy.html">Privacidad</a>
          <a href="mailto:admin@pitchmi.app">Contacto</a>
        </div>

        <div>© <span id="year"></span></div>
      </footer>
    </div>

    <script type="module">
      import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

      document.getElementById("year").textContent = new Date().getFullYear();

      const SUPABASE_URL = "https://rcfehpjksmpjtvhrufhm.supabase.co";
      const SUPABASE_ANON_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJjZmVocGprc21wanR2aHJ1ZmhtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjIwMDcsImV4cCI6MjA3NzU4MjgwN30.XYSRCeGBN74QYAtgcbSz2N47xvQWwVwC4rEZWCKcOpQ";

      const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      let currentPlan = null;

      function getSymbolByCategory(category) {
        const value = String(category || "").toLowerCase();

        if (value.includes("mercad")) return "🌸";
        if (value.includes("concierto")) return "🎶";
        if (value.includes("feria")) return "🎪";
        if (value.includes("ruta")) return "⛰️";
        if (value.includes("gastronom")) return "🍽️";
        if (value.includes("fiesta") || value.includes("noche")) return "✦";
        if (value.includes("evento")) return "🎟️";
        if (value.includes("deporte")) return "◌";
        if (value.includes("lugar")) return "⌖";
        if (value.includes("experiencia")) return "◇";

        return "✦";
      }

      function getFirstImage(pitch) {
        const possible =
          pitch.image_url ||
          pitch.image ||
          pitch.cover_url ||
          pitch.cover_image ||
          pitch.cover_path ||
          "";

        if (possible) return possible;

        if (Array.isArray(pitch.images) && pitch.images.length > 0) {
          return pitch.images[0];
        }

        if (Array.isArray(pitch.image_urls) && pitch.image_urls.length > 0) {
          return pitch.image_urls[0];
        }

        if (Array.isArray(pitch.image_paths) && pitch.image_paths.length > 0) {
          return pitch.image_paths[0];
        }

        return "";
      }

      function formatDateLabel(pitch) {
        const rawDate =
          pitch.live_start_at ||
          pitch.start_at ||
          pitch.starts_at ||
          pitch.date ||
          pitch.created_at ||
          null;

        if (!rawDate) return "Publicado recientemente";

        try {
          const date = new Date(rawDate);

          return new Intl.DateTimeFormat("es-ES", {
            day: "numeric",
            month: "short",
            hour: "2-digit",
            minute: "2-digit",
          }).format(date);
        } catch {
          return "Publicado recientemente";
        }
      }

      function getLocationLabel(pitch) {
        return (
          pitch.location ||
          pitch.address ||
          pitch.place_name ||
          pitch.city ||
          pitch.town ||
          "Ubicación disponible en Pitchmi"
        );
      }

      function getDescription(pitch) {
        return (
          pitch.description ||
          pitch.short_description ||
          pitch.body ||
          "Plan disponible en Pitchmi."
        );
      }

      function normalizePitch(pitch) {
        const category = String(pitch.category || pitch.type || "Plan").trim();
        const title = pitch.title || pitch.name || "Plan en Pitchmi";
        const description = getDescription(pitch);

        return {
          id: pitch.id,
          title,
          description,
          category: category || "Plan",
          location: getLocationLabel(pitch),
          dateLabel: formatDateLabel(pitch),
          symbol: getSymbolByCategory(category),
          imageUrl: getFirstImage(pitch),
          raw: pitch,
        };
      }

      function updateMeta(plan) {
        const title = `${plan.title} | Pitchmi`;
        const description =
          plan.description.length > 155
            ? `${plan.description.slice(0, 152)}...`
            : plan.description;

        document.title = title;

        document
          .getElementById("metaDescription")
          .setAttribute("content", description);

        document.getElementById("ogTitle").setAttribute("content", title);
        document
          .getElementById("ogDescription")
          .setAttribute("content", description);

        document
          .getElementById("ogUrl")
          .setAttribute("content", window.location.href);
      }

      function renderPlan(plan) {
        currentPlan = plan;

        document.getElementById("category").textContent = plan.category;
        document.getElementById("title").textContent = plan.title;
        document.getElementById("location").textContent = `📍 ${plan.location}`;
        document.getElementById("date").textContent = `🗓️ ${plan.dateLabel}`;
        document.getElementById("description").textContent = plan.description;

        const media = document.getElementById("media");

        if (plan.imageUrl) {
          media.textContent = "";
          media.style.backgroundImage = `linear-gradient(135deg, rgba(36,35,33,0.10), rgba(36,35,33,0.10)), url('${plan.imageUrl}')`;
        } else {
          media.textContent = plan.symbol;
          media.style.backgroundImage = "";
        }

        updateMeta(plan);

        document.getElementById("loading").style.display = "none";
        document.getElementById("error").style.display = "none";
        document.getElementById("detail").style.display = "grid";
      }

      function showError() {
        document.getElementById("loading").style.display = "none";
        document.getElementById("error").style.display = "block";
        document.getElementById("detail").style.display = "none";
      }

      async function loadPlan() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");

        if (!id) {
          showError();
          return;
        }

        const { data, error } = await supabase
          .from("pitches")
          .select("*")
          .eq("id", id)
          .single();

        if (error || !data) {
          console.warn("Error cargando plan:", error);
          showError();
          return;
        }

        renderPlan(normalizePitch(data));
      }

      document.getElementById("shareButton").addEventListener("click", async () => {
        try {
          if (navigator.share && currentPlan) {
            await navigator.share({
              title: currentPlan.title,
              text: currentPlan.description,
              url: window.location.href,
            });
            return;
          }

          await navigator.clipboard.writeText(window.location.href);
          alert("Enlace copiado");
        } catch {
          alert("No se ha podido compartir ahora.");
        }
      });

      loadPlan();
    </script>
  </body>
</html>
