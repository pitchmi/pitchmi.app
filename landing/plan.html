<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Redirigiendo a Pitchmi...</title>
    <meta
      name="description"
      content="Abriendo el plan en Pitchmi."
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon.png?v=3" />
<link rel="shortcut icon" type="image/png" href="/favicon.png?v=3" />
<link rel="apple-touch-icon" href="/favicon.png?v=3" />
<meta name="theme-color" content="#f7f4ef" />

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Libre+Baskerville:wght@400;700&display=swap");

      :root {
        --bg: #f7f4ef;
        --paper: #fffdf8;
        --text: #242321;
        --muted: #766f67;
        --line: rgba(44, 42, 40, 0.12);
        --sage: #8b9078;
        --shadow: 0 22px 60px rgba(44, 42, 40, 0.08);
        --radius-xl: 34px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 10% 0%, rgba(255, 255, 255, 0.92), transparent 30%),
          radial-gradient(circle at 90% 8%, rgba(227, 228, 216, 0.72), transparent 26%),
          linear-gradient(180deg, #fbf8f2 0%, var(--bg) 52%, #f1ece3 100%);
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .page {
        width: min(920px, 100%);
        margin: 0 auto;
        padding: 34px clamp(18px, 5vw, 72px);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .logo {
        display: inline-flex;
        flex-direction: column;
        align-items: center;
        width: fit-content;
        gap: 8px;
        margin-bottom: clamp(54px, 8vw, 92px);
      }

      .logo-mark {
        font-family: "Libre Baskerville", Georgia, serif;
        font-size: 17px;
        line-height: 1;
      }

      .logo-word {
        font-family: "Libre Baskerville", Georgia, serif;
        font-size: 19px;
        letter-spacing: 0.34em;
        font-weight: 400;
      }

      .logo-line {
        width: 1px;
        height: 24px;
        background: var(--text);
        opacity: 0.82;
      }

      .card {
        margin: auto 0;
        border-radius: var(--radius-xl);
        background: rgba(255, 253, 248, 0.72);
        border: 1px solid rgba(255, 255, 255, 0.76);
        box-shadow: var(--shadow);
        padding: clamp(28px, 5vw, 52px);
      }

      .eyebrow {
        text-transform: uppercase;
        letter-spacing: 0.16em;
        font-size: 11px;
        color: var(--sage);
        font-weight: 800;
        margin-bottom: 14px;
      }

      h1 {
        font-family: "Libre Baskerville", Georgia, serif;
        font-size: clamp(38px, 5vw, 62px);
        line-height: 1.02;
        font-weight: 400;
        letter-spacing: -0.06em;
        margin: 0 0 18px;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 15.5px;
        line-height: 1.72;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 26px;
      }

      .button {
        min-height: 42px;
        border-radius: 999px;
        border: 1px solid rgba(44, 42, 40, 0.18);
        padding: 0 17px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        font-size: 13px;
        font-weight: 650;
        cursor: pointer;
        white-space: nowrap;
      }

      .button-dark {
        background: #242321;
        color: #fff;
        border-color: #242321;
        box-shadow: 0 14px 28px rgba(44, 42, 40, 0.17);
      }

      .button-light {
        background: rgba(255, 253, 248, 0.68);
        color: var(--text);
      }

      footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        padding-top: 34px;
        color: var(--muted);
        font-size: 12.5px;
      }

      .footer-logo {
        font-family: "Libre Baskerville", Georgia, serif;
        letter-spacing: 0.34em;
        color: var(--text);
      }

      .footer-links {
        display: flex;
        align-items: center;
        gap: 20px;
        flex-wrap: wrap;
      }

      @media (max-width: 560px) {
        .page {
          padding: 22px 14px;
        }

        h1 {
          font-size: 44px;
        }

        footer {
          align-items: flex-start;
          flex-direction: column;
        }
      }
    </style>
  </head>

  <body>
    <div class="page">
      <a class="logo" href="/" aria-label="Pitchmi">
        <span class="logo-mark">✦</span>
        <span class="logo-line"></span>
        <span class="logo-word">PITCHMI</span>
        <span class="logo-line"></span>
        <span class="logo-mark">▾</span>
      </a>

      <main class="card">
        <div class="eyebrow" id="statusLabel">Abriendo plan</div>
        <h1 id="title">Buscando actividad...</h1>
        <p id="message">
          Estamos preparando la página del plan en Pitchmi.
        </p>

        <div class="actions">
          <a id="manualLink" class="button button-dark" href="/planes.html">
            Ver todos los planes
          </a>
          <a class="button button-light" href="/">
            Volver al inicio
          </a>
        </div>
      </main>

      <footer>
        <div class="footer-logo">PITCHMI</div>

        <div class="footer-links">
          <a href="/">Inicio</a>
          <a href="/planes.html">Planes</a>
          <a href="/privacy.html">Privacidad</a>
          <a href="mailto:admin@pitchmi.app">Contacto</a>
        </div>
      </footer>
    </div>

    <script type="module">
      import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

      const SUPABASE_URL = "https://rcfehpjksmpjtvhrufhm.supabase.co";
      const SUPABASE_ANON_KEY =
        "sb_publishable_nlfsq0cZpnVsG9NLqs98SQ_pE24OyTp";

      const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      function stripAccents(value) {
        return String(value || "")
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "");
      }

      function slugify(value) {
        return stripAccents(value)
          .toLowerCase()
          .replace(/&/g, " y ")
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/^-+|-+$/g, "")
          .slice(0, 90);
      }

      function buildPlanUrl(pitch) {
        const title = pitch.title || pitch.name || "Plan en Pitchmi";
        const idSuffix = String(pitch.id || "").slice(0, 8);
        const baseSlug = slugify(title) || `plan-${idSuffix}`;
        const slug = idSuffix ? `${baseSlug}-${idSuffix}` : baseSlug;

        return `/p/${slug}/`;
      }

      function showError() {
        document.getElementById("statusLabel").textContent = "Plan no encontrado";
        document.getElementById("title").textContent = "No hemos encontrado esta actividad";
        document.getElementById("message").textContent =
          "Puede que el enlace sea antiguo o que la actividad ya no esté disponible.";
        document.getElementById("manualLink").textContent = "Buscar planes";
        document.getElementById("manualLink").href = "/planes.html";
      }

      async function redirectToSeoPage() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");

        if (!id) {
          showError();
          return;
        }

        try {
          const { data, error } = await supabase
            .from("pitches")
            .select("id,title,name")
            .eq("id", id)
            .single();

          if (error || !data) {
            console.warn("No se ha podido cargar el plan:", error);
            showError();
            return;
          }

          const url = buildPlanUrl(data);

          document.getElementById("statusLabel").textContent = "Redirigiendo";
          document.getElementById("title").textContent =
            data.title || data.name || "Plan en Pitchmi";
          document.getElementById("message").textContent =
            "Te llevamos a la página pública de esta actividad.";
          document.getElementById("manualLink").textContent = "Abrir plan";
          document.getElementById("manualLink").href = url;

          window.location.replace(url);
        } catch (error) {
          console.warn("Error redirigiendo al plan:", error);
          showError();
        }
      }

      redirectToSeoPage();
    </script>
  </body>
</html>
