<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Planes en Pitchmi</title>
    <meta
      name="description"
      content="Explora planes, actividades, eventos, rutas, ferias y lugares disponibles en Pitchmi."
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Libre+Baskerville:wght@400;700&display=swap");

      :root {
        --bg: #f7f4ef;
        --paper: #fffdf8;
        --text: #242321;
        --muted: #766f67;
        --line: rgba(44, 42, 40, 0.12);
        --sage: #8b9078;
        --shadow: 0 22px 60px rgba(44, 42, 40, 0.08);
        --radius-xl: 34px;
        --radius-lg: 24px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 10% 0%, rgba(255, 255, 255, 0.92), transparent 30%),
          radial-gradient(circle at 90% 8%, rgba(227, 228, 216, 0.72), transparent 26%),
          linear-gradient(180deg, #fbf8f2 0%, var(--bg) 52%, #f1ece3 100%);
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      button,
      input {
        font: inherit;
      }

      .page {
        width: min(1220px, 100%);
        margin: 0 auto;
        padding: 34px clamp(18px, 5vw, 72px) 34px;
      }

      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: clamp(42px, 7vw, 78px);
      }

      .logo {
        display: inline-flex;
        flex-direction: column;
        align-items: center;
        width: fit-content;
        gap: 8px;
      }

      .logo-mark {
        font-family: "Libre Baskerville", Georgia, serif;
        font-size: 17px;
        line-height: 1;
      }

      .logo-word {
        font-family: "Libre Baskerville", Georgia, serif;
        font-size: 19px;
        letter-spacing: 0.34em;
        font-weight: 400;
      }

      .logo-line {
        width: 1px;
        height: 24px;
        background: var(--text);
        opacity: 0.82;
      }

      .button {
        min-height: 42px;
        border-radius: 999px;
        border: 1px solid rgba(44, 42, 40, 0.18);
        padding: 0 17px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        font-size: 13px;
        font-weight: 650;
        cursor: pointer;
        white-space: nowrap;
      }

      .button-dark {
        background: #242321;
        color: #fff;
        border-color: #242321;
        box-shadow: 0 14px 28px rgba(44, 42, 40, 0.17);
      }

      .hero {
        display: grid;
        grid-template-columns: 0.85fr 1.15fr;
        gap: clamp(28px, 5vw, 62px);
        align-items: end;
        margin-bottom: 28px;
      }

      h1 {
        font-family: "Libre Baskerville", Georgia, serif;
        font-size: clamp(48px, 6vw, 82px);
        font-weight: 400;
        letter-spacing: -0.065em;
        line-height: 0.98;
        margin: 0 0 18px;
      }

      .hero p {
        width: min(500px, 100%);
        margin: 0;
        color: #4d4842;
        font-size: 15.5px;
        line-height: 1.72;
      }

      .search-box {
        border-radius: var(--radius-xl);
        background: rgba(255, 253, 248, 0.68);
        border: 1px solid rgba(255, 255, 255, 0.76);
        box-shadow: var(--shadow);
        padding: 20px;
      }

      .search-box label {
        display: block;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--sage);
        margin-bottom: 10px;
      }

      .search-input {
        width: 100%;
        height: 48px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.75);
        padding: 0 18px;
        outline: none;
        color: var(--text);
      }

      .filters {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin: 22px 0 28px;
      }

      .filter {
        border: 1px solid var(--line);
        background: rgba(255, 253, 248, 0.74);
        color: #5d564f;
        border-radius: 999px;
        padding: 10px 14px;
        cursor: pointer;
        font-size: 12.5px;
        font-weight: 650;
      }

      .filter.active {
        background: #242321;
        border-color: #242321;
        color: #fff;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 18px;
      }

      .plan-card {
        background: rgba(255, 255, 255, 0.78);
        border: 1px solid var(--line);
        border-radius: var(--radius-lg);
        overflow: hidden;
        box-shadow: 0 12px 28px rgba(44, 42, 40, 0.06);
        transition:
          transform 0.18s ease,
          box-shadow 0.18s ease;
      }

      .plan-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 18px 36px rgba(44, 42, 40, 0.09);
      }

      .plan-media {
        position: relative;
        height: 150px;
        background:
          radial-gradient(circle at 28% 24%, rgba(255, 255, 255, 0.64), transparent 22%),
          linear-gradient(135deg, #e8e1d7, #c9c2b2);
        background-size: cover;
        background-position: center;
        display: grid;
        place-items: center;
        font-size: 38px;
      }

      .category {
        position: absolute;
        top: 12px;
        left: 12px;
        border-radius: 999px;
        background: rgba(255, 253, 248, 0.84);
        border: 1px solid rgba(255, 255, 255, 0.72);
        padding: 6px 10px;
        color: #6d645b;
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.12em;
      }

      .plan-body {
        padding: 16px;
      }

      .plan-title {
        font-family: "Libre Baskerville", Georgia, serif;
        margin: 0 0 10px;
        font-size: 20px;
        line-height: 1.2;
        font-weight: 400;
        letter-spacing: -0.035em;
      }

      .meta {
        display: grid;
        gap: 5px;
        margin-bottom: 12px;
        color: var(--muted);
        font-size: 12.5px;
        line-height: 1.4;
      }

      .description {
        margin: 0;
        color: #514c46;
        font-size: 13.5px;
        line-height: 1.62;
      }

      .empty,
      .loading {
        border-radius: var(--radius-xl);
        background: rgba(255, 253, 248, 0.7);
        border: 1px solid var(--line);
        padding: 30px;
        color: var(--muted);
      }

      .empty {
        display: none;
      }

      footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        padding-top: 34px;
        color: var(--muted);
        font-size: 12.5px;
      }

      .footer-logo {
        font-family: "Libre Baskerville", Georgia, serif;
        letter-spacing: 0.34em;
        color: var(--text);
      }

      .footer-links {
        display: flex;
        align-items: center;
        gap: 20px;
        flex-wrap: wrap;
      }

      @media (max-width: 1080px) {
        .hero {
          grid-template-columns: 1fr;
        }

        .grid {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }
      }

      @media (max-width: 760px) {
        .grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 560px) {
        .page {
          padding: 22px 14px;
        }

        .header {
          align-items: flex-start;
          flex-direction: column;
        }

        .grid {
          grid-template-columns: 1fr;
        }

        h1 {
          font-size: 52px;
        }

        footer {
          align-items: flex-start;
          flex-direction: column;
        }
      }
    </style>
  </head>

  <body>
    <div class="page">
      <header class="header">
        <a class="logo" href="/" aria-label="Pitchmi">
          <span class="logo-mark">✦</span>
          <span class="logo-line"></span>
          <span class="logo-word">PITCHMI</span>
          <span class="logo-line"></span>
          <span class="logo-mark">▾</span>
        </a>

        <a
          class="button button-dark"
          href="https://apps.apple.com/es/app/pitchmi/id6754662676"
          target="_blank"
          rel="noopener noreferrer"
        >
          Descargar la app
        </a>
      </header>

      <main>
        <section class="hero">
          <div>
            <h1>Planes<br />en Pitchmi</h1>
            <p>
              Actividades, lugares, rutas y eventos publicados en Pitchmi.
              Explora por categoría o busca un plan concreto.
            </p>
          </div>

          <div class="search-box">
            <label for="searchInput">Buscar</label>
            <input
              id="searchInput"
              class="search-input"
              type="search"
              placeholder="Buscar por título, categoría o ubicación"
            />
          </div>
        </section>

        <div id="filters" class="filters">
          <button class="filter active" type="button" data-category="Todos">
            Todos
          </button>
        </div>

        <div id="loadingState" class="loading">Cargando planes...</div>
        <div id="plansGrid" class="grid"></div>

        <div id="emptyState" class="empty">
          No se han encontrado planes con esta búsqueda.
        </div>
      </main>

      <footer>
        <div class="footer-logo">PITCHMI</div>

        <div class="footer-links">
          <a href="/">Inicio</a>
          <a href="/privacy.html">Privacidad</a>
          <a href="mailto:admin@pitchmi.app">Contacto</a>
        </div>

        <div>© <span id="year"></span></div>
      </footer>
    </div>

    <script type="module">
      import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

      document.getElementById("year").textContent = new Date().getFullYear();

      const SUPABASE_URL = "https://rcfehpjksmpjtvhrufhm.supabase.co";
      const SUPABASE_ANON_KEY =
        "sb_publishable_nlfsq0cZpnVsG9NLqs98SQ_pE24OyTp";

      const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      let allPlans = [];
      let selectedCategory = "Todos";

      const urlParams = new URLSearchParams(window.location.search);
      const initialSearchQuery = urlParams.get("q") || "";

      function escapeHTML(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function stripAccents(value) {
        return String(value || "")
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "");
      }

      function slugify(value) {
        return stripAccents(value)
          .toLowerCase()
          .replace(/&/g, " y ")
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/^-+|-+$/g, "")
          .slice(0, 90);
      }

      function normalizeText(value) {
        return stripAccents(String(value || "").toLowerCase());
      }

      function getSymbolByCategory(category) {
        const value = String(category || "").toLowerCase();

        if (value.includes("mercad")) return "🌸";
        if (value.includes("concierto")) return "🎶";
        if (value.includes("feria")) return "🎪";
        if (value.includes("ruta")) return "⛰️";
        if (value.includes("gastronom")) return "🍽️";
        if (value.includes("fiesta") || value.includes("noche")) return "✦";
        if (value.includes("evento")) return "🎟️";
        if (value.includes("deporte")) return "◌";
        if (value.includes("lugar")) return "⌖";
        if (value.includes("experiencia")) return "◇";

        return "✦";
      }

      function getFirstImage(pitch) {
        const possible =
          pitch.image_url ||
          pitch.image ||
          pitch.cover_url ||
          pitch.cover_image ||
          pitch.cover_path ||
          "";

        if (possible) return possible;

        if (Array.isArray(pitch.images) && pitch.images.length > 0) {
          return pitch.images[0];
        }

        if (Array.isArray(pitch.image_urls) && pitch.image_urls.length > 0) {
          return pitch.image_urls[0];
        }

        if (Array.isArray(pitch.image_paths) && pitch.image_paths.length > 0) {
          return pitch.image_paths[0];
        }

        return "";
      }

      function formatDateLabel(pitch) {
        const rawDate =
          pitch.live_start_at ||
          pitch.start_at ||
          pitch.starts_at ||
          pitch.date ||
          pitch.created_at ||
          null;

        if (!rawDate) return "Publicado recientemente";

        try {
          const date = new Date(rawDate);

          return new Intl.DateTimeFormat("es-ES", {
            day: "numeric",
            month: "short",
            hour: "2-digit",
            minute: "2-digit",
          }).format(date);
        } catch {
          return "Publicado recientemente";
        }
      }

      function getLocationLabel(pitch) {
        return (
          pitch.location ||
          pitch.address ||
          pitch.place_name ||
          pitch.city ||
          pitch.town ||
          "Ubicación disponible en Pitchmi"
        );
      }

      function getDescription(pitch, short = false) {
        const text =
          pitch.description ||
          pitch.short_description ||
          pitch.body ||
          "Plan disponible en Pitchmi.";

        if (!short) return text;

        return text.length > 126 ? `${text.slice(0, 123)}...` : text;
      }

      function normalizePitch(pitch) {
        const title = pitch.title || pitch.name || "Plan en Pitchmi";
        const category = String(pitch.category || pitch.type || "Plan").trim();
        const idSuffix = String(pitch.id || "").slice(0, 8);
        const baseSlug = slugify(title) || `plan-${idSuffix}`;
        const slug = idSuffix ? `${baseSlug}-${idSuffix}` : baseSlug;

        return {
          id: pitch.id,
          slug,
          url: `/p/${slug}/`,
          title,
          description: getDescription(pitch, false),
          shortDescription: getDescription(pitch, true),
          category: category || "Plan",
          location: getLocationLabel(pitch),
          dateLabel: formatDateLabel(pitch),
          symbol: getSymbolByCategory(category),
          imageUrl: getFirstImage(pitch),
        };
      }

      function renderFilters(plans) {
        const container = document.getElementById("filters");

        const categories = Array.from(
          new Set(plans.map((plan) => plan.category).filter(Boolean))
        ).sort((a, b) => a.localeCompare(b, "es"));

        container.innerHTML = `
          <button class="filter active" type="button" data-category="Todos">
            Todos
          </button>
          ${categories
            .map(
              (category) => `
                <button class="filter" type="button" data-category="${escapeHTML(category)}">
                  ${escapeHTML(category)}
                </button>
              `
            )
            .join("")}
        `;

        container.querySelectorAll(".filter").forEach((button) => {
          button.addEventListener("click", () => {
            selectedCategory = button.dataset.category || "Todos";

            container.querySelectorAll(".filter").forEach((item) => {
              item.classList.remove("active");
            });

            button.classList.add("active");
            renderPlans();
          });
        });
      }

      function renderPlans() {
        const grid = document.getElementById("plansGrid");
        const empty = document.getElementById("emptyState");
        const loading = document.getElementById("loadingState");
        const query = normalizeText(document.getElementById("searchInput").value.trim());

        const filtered = allPlans.filter((plan) => {
          const matchesCategory =
            selectedCategory === "Todos" || plan.category === selectedCategory;

          const searchable = normalizeText(
            `${plan.title} ${plan.category} ${plan.location} ${plan.description}`
          );

          const matchesSearch = !query || searchable.includes(query);

          return matchesCategory && matchesSearch;
        });

        loading.style.display = "none";
        empty.style.display = filtered.length === 0 ? "block" : "none";

        grid.innerHTML = filtered
          .map((plan) => {
            const mediaStyle = plan.imageUrl
              ? `style="background-image: linear-gradient(135deg, rgba(36,35,33,0.08), rgba(36,35,33,0.08)), url('${escapeHTML(plan.imageUrl)}')"`
              : "";

            return `
              <a class="plan-card" href="${escapeHTML(plan.url)}">
                <div class="plan-media" ${mediaStyle}>
                  ${plan.imageUrl ? "" : escapeHTML(plan.symbol)}
                  <span class="category">${escapeHTML(plan.category)}</span>
                </div>
                <div class="plan-body">
                  <h2 class="plan-title">${escapeHTML(plan.title)}</h2>
                  <div class="meta">
                    <span>📍 ${escapeHTML(plan.location)}</span>
                    <span>🗓️ ${escapeHTML(plan.dateLabel)}</span>
                  </div>
                  <p class="description">${escapeHTML(plan.shortDescription)}</p>
                </div>
              </a>
            `;
          })
          .join("");
      }

      const searchInput = document.getElementById("searchInput");
      searchInput.value = initialSearchQuery;
      searchInput.addEventListener("input", renderPlans);

      async function loadPlans() {
        try {
          const { data, error } = await supabase
            .from("pitches")
            .select("*")
            .order("created_at", { ascending: false })
            .limit(500);

          if (error) {
            console.warn("Error cargando planes:", error);
            document.getElementById("loadingState").textContent =
              "No se han podido cargar los planes.";
            return;
          }

          allPlans = Array.isArray(data) ? data.map(normalizePitch) : [];

          renderFilters(allPlans);
          renderPlans();
        } catch (error) {
          console.warn("Error cargando planes:", error);
          document.getElementById("loadingState").textContent =
            "No se han podido cargar los planes.";
        }
      }

      loadPlans();
    </script>
  </body>
</html>
